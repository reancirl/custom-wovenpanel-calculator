query CartTransformRunInput {
  cart {
    lines {
      id
      parentRelationship {
        parent {
          id
        }
      }
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      length: attribute(key: "length") {
        value
      }
      width: attribute(key: "width") {
        value
      }
      lengthMm: attribute(key: "length_mm") {
        value
      }
      widthMm: attribute(key: "width_mm") {
        value
      }
      area: attribute(key: "area") {
        value
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            enableSqmPricing: metafield(namespace: "custom", key: "enable_sqm_pricing") {
              value
            }
            minLength: metafield(namespace: "custom", key: "min_length") {
              value
            }
            maxLength: metafield(namespace: "custom", key: "max_length") {
              value
            }
            minWidth: metafield(namespace: "custom", key: "min_width") {
              value
            }
            maxWidth: metafield(namespace: "custom", key: "max_width") {
              value
            }
          }
        }
      }
    }
  }
}
